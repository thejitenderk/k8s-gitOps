apiVersion: v1
kind: Service
metadata:
  name: react-app-svc
  namespace: default
  labels:
    app: react-app
spec:
  type: ClusterIP          # change to LoadBalancer or NodePort for cloud/local exposure
  selector:
    app: react-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
