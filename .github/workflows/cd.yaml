name: CD — Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g. latest or sha-abc1234)'
        required: true
        default: 'latest'
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'                  # ← default staging kiya
        type: choice
        options:
          - staging                          # ← staging pehle
          - production

  workflow_run:
    workflows: ["CI — Docker Build & Push"]
    branches: [main]
    types: [completed]

env:
  IMAGE_NAME: argocdacrjk.azurecr.io/react-cicd-app

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}  # ← default staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image tag and namespace
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
            NAMESPACE="${{ github.event.inputs.environment }}"
          else
            TAG="latest"
            NAMESPACE="staging"             # ← auto trigger pe staging
          fi
          echo "tag=${TAG}"             >> "$GITHUB_OUTPUT"
          echo "namespace=${NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "🏷️  Tag       : ${TAG}"
          echo "🌍 Namespace  : ${NAMESPACE}"

      - name: Configure kubeconfig
        run: |
          kubectl config use-context docker-desktop
          kubectl config set-context --current --namespace=${{ steps.resolve.outputs.namespace }}

      - name: Apply K8s manifests with image tag
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.tag }}"
          echo "📦 Setting image → ${IMAGE}"
          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml -n ${{ steps.resolve.outputs.namespace }}
          kubectl apply -f k8s/service.yaml    -n ${{ steps.resolve.outputs.namespace }}

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/react-app \
            -n ${{ steps.resolve.outputs.namespace }} \
            --timeout=120s

      - name: Verify running pods
        run: |
          kubectl get pods -n ${{ steps.resolve.outputs.namespace }} -l app=react-app
          kubectl get svc  -n ${{ steps.resolve.outputs.namespace }} react-app-svc

      - name: Deployment summary
        run: |
          echo "✅ Deployed ${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.tag }}"
          echo "🌍 Namespace  : ${{ steps.resolve.outputs.namespace }}"
          echo "🔀 Triggered by: ${{ github.event_name }}"