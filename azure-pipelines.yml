# azure-pipelines-cd.yml
trigger: none

variables:
  - name: kubernetesServiceConnection
    value: 'dev-dev-1780706333593'                        # ✅ your k8s service connection
  - name: namespace
    value: 'dev'
  - name: imageRepository
    value: 'react-cicd-app'                               # ✅ image name only
  - name: containerRegistry
    value: 'acrforalluser.azurecr.io'
  - name: imagePullSecret
    value: 'acr-pull-secret'
  - name: imageTag
    value: '$(Build.BuildId)'

stages:
  # # ─────────────────────────────────────────────────────
  # # STAGE 1 — Create imagePullSecret from ACR
  # # ─────────────────────────────────────────────────────
  # - stage: Setup_Secrets
  #   displayName: '🔐 Setup ACR Pull Secret'
  #   jobs:
  #     - job: CreatePullSecret
  #       displayName: 'Create ACR imagePullSecret in dev'
  #       pool: mac                                          # ✅ self hosted agent
  #       steps:
  #         - task: KubernetesManifest@1
  #           displayName: '🔑 Create acr-pull-secret'
  #           inputs:
  #             action: 'createSecret'
  #             connectionType: 'kubernetesServiceConnection'
  #             kubernetesServiceConnection: '$(kubernetesServiceConnection)'
  #             namespace: '$(namespace)'
  #             secretType: 'dockerRegistry'
  #             secretName: '$(imagePullSecret)'
  #             dockerRegistryEndpoint: 'acrforalluser'      # ✅ ACR service connection name in Azure DevOps

  # ─────────────────────────────────────────────────────
  # STAGE 2 — Deploy to DEV
  # ─────────────────────────────────────────────────────
  - stage: Deploy_Dev
    displayName: '🚀 Deploy to DEV'
    condition: succeeded()
    jobs:
      - deployment: DeployToDev
        displayName: 'Deploy to dev namespace'
        pool: mac                                          # ✅ self hosted agent
        environment: 'dev'                                 # ✅ your Azure DevOps environment
        strategy:
          runOnce:
            deploy:
              steps:

                # ── Bake Manifests ──
                - task: KubernetesManifest@1
                  displayName: '🔁 Bake Manifests'
                  name: bake
                  inputs:
                    action: 'bake'
                    renderType: 'kubectl'
                    manifests: |
                      $(Pipeline.Workspace)/k8s/deployment.yaml
                      $(Pipeline.Workspace)/k8s/service.yaml

                # ── Deploy to dev namespace ──
                - task: KubernetesManifest@1
                  displayName: '🚀 Deploy to DEV Namespace'
                  inputs:
                    action: 'deploy'
                    connectionType: 'kubernetesServiceConnection'
                    kubernetesServiceConnection: '$(kubernetesServiceConnection)'
                    namespace: '$(namespace)'
                    manifests: $(bake.manifestsBundle)
                    imagePullSecrets: '$(imagePullSecret)'
                    containers: |
                      $(containerRegistry)/$(imageRepository):$(imageTag)

                # ── Verify Rollout ──
                - task: Kubernetes@1
                  displayName: '🔍 Verify Rollout Status'
                  inputs:
                    connectionType: 'kubernetesServiceConnection'
                    kubernetesServiceConnection: '$(kubernetesServiceConnection)'
                    namespace: '$(namespace)'
                    command: 'rollout'
                    arguments: 'status deployment/$(imageRepository) -n $(namespace) --timeout=120s'

  # ─────────────────────────────────────────────────────
  # STAGE 3 — Smoke Test
  # ─────────────────────────────────────────────────────
  - stage: Smoke_Test
    displayName: '🧪 Smoke Test DEV'
    dependsOn: Deploy_Dev
    condition: succeeded()
    jobs:
      - job: SmokeTest
        displayName: 'Verify Pods & Print Summary'
        pool: mac                                          # ✅ self hosted agent
        steps:

          # ── Check Pod Status ──
          - task: Kubernetes@1
            displayName: '🟢 Check Pod Status'
            inputs:
              connectionType: 'kubernetesServiceConnection'
              kubernetesServiceConnection: '$(kubernetesServiceConnection)'
              namespace: '$(namespace)'
              command: 'get'
              arguments: 'pods -n dev -l app=$(imageRepository) --field-selector=status.phase=Running'

          # ── Check Service ──
          - task: Kubernetes@1
            displayName: '🌐 Check Service Status'
            inputs:
              connectionType: 'kubernetesServiceConnection'
              kubernetesServiceConnection: '$(kubernetesServiceConnection)'
              namespace: '$(namespace)'
              command: 'get'
              arguments: 'svc -n dev'

          # ── Verify SA imagePullSecret ──
          - task: Kubernetes@1
            displayName: '🔐 Verify SA imagePullSecret'
            inputs:
              connectionType: 'kubernetesServiceConnection'
              kubernetesServiceConnection: '$(kubernetesServiceConnection)'
              namespace: '$(namespace)'
              command: 'get'
              arguments: 'serviceaccount sa-local -n dev -o yaml'

          # ── Deployment Summary ──
          - script: |
              echo "╔══════════════════════════════════════════╗"
              echo "║        ✅ DEV DEPLOYMENT SUMMARY          ║"
              echo "╠══════════════════════════════════════════╣"
              echo "║ Namespace   : dev                         ║"
              echo "║ ACR         : acrforalluser.azurecr.io    ║"
              echo "║ Image       : react-cicd-app              ║"
              echo "║ Tag         : $(imageTag)                 ║"
              echo "║ SA          : sa-local                    ║"
              echo "║ Pull Secret : acr-pull-secret             ║"
              echo "║ K8s Conn    : dev-dev-1780706333593       ║"
              echo "║ Status      : SUCCESS 🚀                  ║"
              echo "╚══════════════════════════════════════════╝"
            displayName: '📋 Print Deployment Summary'